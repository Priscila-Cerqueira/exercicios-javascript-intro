<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 03 - Conversor de Moeda Express</title>
    <link rel="stylesheet" href="ex03.css">
</head>
<body>

    <div class="container">
        <h1>Conversor de Moeda (R$ para US$)</h1>
        
        <div class="form-group">
            <label for="valorReal">Valor em Reais (R$):</label>
            <input type="number" id="valorReal" step="0.01" placeholder="Ex: 100.00">
        </div>

        <div class="form-group">
            <label for="cotacaoDolar">Cotação do Dólar (US$):</label>
            <input type="number" id="cotacaoDolar" step="0.01" value="5.15">
        </div>

        <button id="btnConverter">Converter para Dólar</button>

        <div id="resultadoCâmbio" class="resultado-box hidden">
            <p id="textoConversao"></p>
        </div>
    </div>

    <script src="ex03.js"></script>
</body>
</html>
