<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 02 - Calculadora de Comissão</title>
    <link rel="stylesheet" href="ex02.css">
</head>
<body>

    <div class="container">
        <h1>Calculadora de Vendas (Comissão 12%)</h1>
        
        <div class="form-group">
            <label for="nomeVendedor">Nome do Vendedor:</label>
            <input type="text" id="nomeVendedor" placeholder="Ex: Priscila Cerqueira">
        </div>

        <div class="form-group">
            <label for="salarioBase">Salário Base (R$):</label>
            <input type="number" id="salarioBase" step="0.01" placeholder="0.00">
        </div>

        <div class="form-group">
            <label for="totalVendas">Total de Vendas no Mês (R$):</label>
            <input type="number" id="totalVendas" step="0.01" placeholder="0.00">
        </div>

        <button id="btnCalcular">Calcular Salário Final</button>

        <div id="painelResultado" class="resultado-box hidden">
            <h3>Resumo do Fechamento</h3>
            <p id="mensagemSaida"></p>
        </div>
    </div>

    <script src="ex02.js"></script>
</body>
</html>
